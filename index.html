<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARズレ修正版</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* 画面いっぱいに表示し、余計な余白を消す */
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #28a745; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
        }
        /* A-Frameのキャンバスがズレないように固定 */
        .a-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; }
    </style>
</head>
<body>
    <button id="start-button" onclick="startAR()">ARカメラを起動</button>

    <a-scene 
        <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; filterMinCF: 0.001; filterBeta: 10;" 
    ...>
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <video id="v" src="./intro_video.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t" mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="1" position="0 0 0.1" scale="1 1 1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#v");
        const btn = document.querySelector("#start-button");

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            btn.style.display = "none";
            arSystem.start();
            
            video.play().then(() => {
                video.pause();
                video.muted = false;
            });
        }

        document.querySelector('#t').addEventListener("targetFound", () => {
            console.log("ターゲット発見！");
            video.play();
        });

        document.querySelector('#t').addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
